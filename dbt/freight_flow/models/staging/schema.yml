version: 2

models:
  - name: stg_faf_shipments
    description: "Cleaned and typed FAF5 shipment data. One row per origin-destination-commodity-mode-trade_type combination."
    columns:
      - name: shipment_id
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: origin_zone
        tests:
          - not_null
      - name: destination_zone
        tests:
          - not_null
      - name: commodity_code
        tests:
          - not_null
      - name: mode_code
        tests:
          - not_null
  - name: stg_transborder_freight
    description: "Cleaned TransBorder freight data. Monthly cross-border freight by state, commodity, and mode."
    columns:
      - name: transborder_id
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: usa_state
        tests:
          - not_null
      - name: commodity_code
        tests:
          - not_null
      - name: mode_code
        tests:
          - not_null
      - name: year
        tests:
          - not_null
      - name: month
        tests:
          - not_null
  - name: stg_faf_shipments_long
    description: "FAF shipments unpivoted to long format. One row per shipment-year combination."
    columns:
      - name: year
        tests:
          - not_null
      - name: tons
        tests:
          - not_null
      - name: shipment_id
        tests:
          - not_null
  - name: stg_supply_chain_indicators
    description: "Monthly BTS Transportation Services Index and freight indicators. Covers 2000-present."
    columns:
      - name: obs_date
        tests:
          - unique
          - not_null
      - name: tsi_freight
        tests:
          - not_null
      - name: truck_vmt
        tests:
          - not_null
      - name: year
        tests:
          - not_null